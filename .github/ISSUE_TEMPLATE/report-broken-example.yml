name: Report a broken example
description: An example doesn't run, has a broken link, or its README is misleading
title: "[Broken] "
labels: ["bug", "broken-example"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The fastest path to a fix is a clean reproducer. If the issue is in the Resonate SDK or server itself (not the example), please file it on the upstream repo (`resonatehq/resonate-sdk-ts`, `-py`, `-rs`, or `resonatehq/resonate`).

  - type: input
    id: repo
    attributes:
      label: Affected repo
      description: Full URL or `org/repo` shorthand.
      placeholder: e.g. resonatehq-examples/example-saga-booking-ts
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: What's broken?
      options:
        - "Example doesn't run (clone → install → run fails)"
        - "Code throws / wrong behavior at runtime"
        - "README is wrong or misleading"
        - "Broken link in README"
        - "SDK version is stale (compared to latest)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Failing command
      description: Exact command(s) you ran. Include any environment setup the README told you to do first.
      render: bash
      placeholder: |
        git clone https://github.com/resonatehq-examples/example-foo-ts
        cd example-foo-ts
        npm install
        npm run start
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the relevant error / log lines. Trim to the essential — full logs go in a gist if needed.
      render: text
      placeholder: |
        ReferenceError: Resonate is not defined
            at /path/to/repo/src/index.ts:3:10
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Anything that might matter for reproducing.
      placeholder: |
        - OS: macOS 14.5 (arm64)
        - Node: 22.3.0 (or Python 3.12.4, or Rust 1.81.0)
        - SDK version: @resonatehq/sdk@0.10.2
        - Resonate server: brew install, version `resonate --version` reports
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. The README's "What to look for" section says I should see "Done!" — instead the worker exits with the error above.
    validations:
      required: false

  - type: checkboxes
    id: confirmed
    attributes:
      label: Reproducer confirmed
      options:
        - label: I tried this on a fresh clone (not a pre-existing checkout)
        - label: I confirmed the SDK version matches what `package.json` / `pyproject.toml` / `Cargo.toml` pins
